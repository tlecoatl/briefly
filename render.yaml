services:
  - type: web
    name: briefly-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py migrate
    startCommand: gunicorn core.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: briefly-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: briefly-redis
          type: redis
          property: connectionString
      - key: GROQ_API_KEY
        sync: false

  - type: redis
    name: briefly-redis
    plan: free
    ipAllowList: []

databases:
  - name: briefly-db
    plan: free